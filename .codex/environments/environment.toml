<script>
async function downloadImage(format) {
  const scale = parseInt(document.getElementById('qualitySelect').value);
  const msg = document.getElementById('status-msg');
  msg.textContent = '⏳ Rendering... please wait';
 
  await new Promise(r => setTimeout(r, 100));
 
  try {
    const canvas = await html2canvas(document.getElementById('poster'), {
      scale: scale,
      useCORS: true,
      backgroundColor: '#FAF6F0',
      logging: false,
    });
 
    const isJpg = format === 'jpg';
    const dataURL = isJpg
      ? canvas.toDataURL('image/jpeg', 0.97)
      : canvas.toDataURL('image/png');
    const filename = isJpg ? 'GuessCheck_AI_Poster.jpg' : 'GuessCheck_AI_Poster.png';
 
    const a = document.createElement('a');
    a.href = dataURL;
    a.download = filename;
    a.click();
 
    msg.textContent = `✅ Done! ${canvas.width}×${canvas.height}px`;
    setTimeout(() => msg.textContent = '', 5000);
  } catch (e) {
    msg.textContent = '❌ Failed. Try again.';
    console.error(e);
  }
}
</script>
